<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, height=630">
<title>BizBrain OS v3.0.1 — Feature Highlight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0f172a 0%, #1e1e3a 50%, #1e293b 100%);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: #e2e8f0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    overflow: hidden;
    position: relative;
  }
  /* Subtle grid pattern */
  body::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      linear-gradient(rgba(56, 189, 248, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(56, 189, 248, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .content { position: relative; z-index: 1; text-align: center; }
  .logo {
    font-size: 18px; font-weight: 700; color: #38bdf8;
    letter-spacing: 2px; text-transform: uppercase;
    margin-bottom: 8px;
  }
  .title {
    font-size: 52px; font-weight: 800; margin-bottom: 8px;
    color: #f1f5f9; letter-spacing: -1px;
  }
  .tagline {
    font-size: 20px; color: #94a3b8; margin-bottom: 48px;
    font-style: italic;
  }
  .stats {
    display: flex; gap: 24px; margin-bottom: 40px;
    justify-content: center;
  }
  .stat {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid #334155;
    border-radius: 12px; padding: 16px 28px;
    text-align: center;
  }
  .stat-number {
    font-size: 36px; font-weight: 800; color: #38bdf8;
  }
  .stat-label {
    font-size: 13px; color: #94a3b8; margin-top: 2px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .new-feature {
    background: linear-gradient(135deg, rgba(34, 197, 94, 0.1), rgba(34, 197, 94, 0.05));
    border: 2px solid rgba(34, 197, 94, 0.3);
    border-radius: 16px; padding: 20px 40px;
    display: inline-flex; align-items: center; gap: 16px;
  }
  .new-badge {
    background: #22c55e; color: #052e16;
    font-size: 12px; font-weight: 800;
    padding: 4px 10px; border-radius: 6px;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .new-text {
    font-size: 20px; font-weight: 600; color: #86efac;
  }
  .bottom-badges {
    position: absolute; bottom: 28px;
    display: flex; gap: 20px;
  }
  .bottom-badge {
    font-size: 14px; color: #64748b;
    display: flex; align-items: center; gap: 6px;
  }
  .bottom-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #22c55e;
  }
</style>
</head>
<body>
  <div class="content">
    <div class="logo">BizBrain OS</div>
    <div class="title">v3.0.1</div>
    <div class="tagline">The compound interest of AI context.</div>
    <div class="stats">
      <div class="stat">
        <div class="stat-number">16</div>
        <div class="stat-label">Skills</div>
      </div>
      <div class="stat">
        <div class="stat-number">12</div>
        <div class="stat-label">Commands</div>
      </div>
      <div class="stat">
        <div class="stat-number">3</div>
        <div class="stat-label">Agents</div>
      </div>
      <div class="stat">
        <div class="stat-number">5</div>
        <div class="stat-label">Profiles</div>
      </div>
    </div>
    <div class="new-feature">
      <span class="new-badge">New</span>
      <span class="new-text">Local Meeting Transcription</span>
    </div>
  </div>
  <div class="bottom-badges">
    <div class="bottom-badge"><span class="dot"></span> 100% Private</div>
    <div class="bottom-badge"><span class="dot"></span> $0/month</div>
    <div class="bottom-badge"><span class="dot"></span> Open Source (AGPL-3.0)</div>
    <div class="bottom-badge"><span class="dot"></span> Claude Code Plugin</div>
  </div>
</body>
</html>
